---
# roles/k8s_deployment/tasks/main.yml
- name: Create ConfigMap for CloudMart application
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cloudmart-config
        namespace: default
      data:
        backend_url: "http://cloudmart-backend:5000"
        environment: "{{ deployment_environment }}"
        aws_region: "{{ aws_region }}"

- name: Create Secret for database credentials
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloudmart-db-secrets
        namespace: default
      type: Opaque
      data:
        db_host: "{{ db_host | b64encode }}"
        db_user: "{{ db_user | b64encode }}"
        db_password: "{{ db_password | b64encode }}"
        db_name: "{{ db_name | b64encode }}"

- name: Create backend deployment
  kubernetes.core.k8s:
    state: present
    template: "templates/cloudmart-backend.yaml.j2"

- name: Create backend service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: cloudmart-backend
        namespace: default
        labels:
          app: cloudmart
          component: backend
      spec:
        selector:
          app: cloudmart
          component: backend
        ports:
          - port: 5000
            targetPort: 5000
            protocol: TCP
        type: ClusterIP

- name: Create frontend deployment
  kubernetes.core.k8s:
    state: present
    template: "templates/cloudmart-frontend.yaml.j2"

- name: Create frontend service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: cloudmart-frontend
        namespace: default
        labels:
          app: cloudmart
          component: frontend
      spec:
        selector:
          app: cloudmart
          component: frontend
        ports:
          - port: 5001
            targetPort: 5001
            protocol: TCP
        type: ClusterIP

- name: Create ingress for application
  kubernetes.core.k8s:
    state: present
    template: "templates/cloudmart-ingress.yaml.j2"
