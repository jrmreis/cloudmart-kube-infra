name: CloudMart CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ECR_REPOSITORY: public.ecr.aws/l4c0j8h9/cloudmart
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: cloudmart

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Login to Amazon ECR Public
      id: login-ecr-public
      run: |
        aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/l4c0j8h9
        
    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      run: |
        # Build Docker image
        docker build -t ${{ env.ECR_REPOSITORY }}:${{ github.sha }} .
        docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} ${{ env.ECR_REPOSITORY }}:latest
        
        # Push Docker image to ECR
        docker push ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        docker push ${{ env.ECR_REPOSITORY }}:latest
        
        # Save image URI for the deploy job
        echo "IMAGE_URI=${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_ENV
        
    - name: Generate Kubernetes manifests
      run: |
        # Replace CONTAINER_IMAGE placeholder with actual image URI
        sed -i "s|CONTAINER_IMAGE|${{ env.IMAGE_URI }}|g" cloudmart-frontend.yaml
        
    - name: Upload Kubernetes manifests
      uses: actions/upload-artifact@v3
      with:
        name: kubernetes-manifests
        path: cloudmart-frontend.yaml

  deploy:
    name: Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Kubernetes manifests
      uses: actions/download-artifact@v3
      with:
        name: kubernetes-manifests
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
        
    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f cloudmart-frontend.yaml
        kubectl get pods -l app=cloudmart-app
