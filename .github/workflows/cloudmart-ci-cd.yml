name: CloudMart CI/CD Pipeline

on:
  push:
    branches: [ main, dev_imp ]
  pull_request:
    branches: [ main, dev_imp ]

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read

env:
  ECR_REPOSITORY: cloudmart-backend
  EKS_CLUSTER_NAME: cloudmart
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      # OPTION 1: Configure AWS credentials using IAM Access Keys
      # Uncomment this section if you want to use IAM access keys
      #- name: Configure AWS credentials with access keys
      #  uses: aws-actions/configure-aws-credentials@v1
      #  with:
      #    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #    aws-region: ${{ env.AWS_REGION }}
      
      # OPTION 2: Configure AWS credentials using OIDC
      # Uncomment this section if you want to use OIDC (and comment out the section above)
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::445567090747:role/github-actions-cloudmart
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR Public
        id: login-ecr-public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws/l4c0j8h9
      
      - name: Check for Dockerfile and create if missing
        run: |
          if [ ! -f Dockerfile ]; then
            echo "Dockerfile not found. Creating a basic Dockerfile..."
            echo 'FROM node:18-alpine' > Dockerfile
            echo '' >> Dockerfile
            echo 'WORKDIR /usr/src/app' >> Dockerfile
            echo '' >> Dockerfile
            echo '# Copy package files and install dependencies' >> Dockerfile
            echo 'COPY package*.json ./' >> Dockerfile
            echo 'RUN npm install' >> Dockerfile
            echo '' >> Dockerfile
            echo '# Copy application code' >> Dockerfile
            echo 'COPY . .' >> Dockerfile
            echo '' >> Dockerfile
            echo '# Build the application if needed' >> Dockerfile
            echo 'RUN npm run build --if-present' >> Dockerfile
            echo '' >> Dockerfile
            echo '# Expose the application port' >> Dockerfile
            echo 'EXPOSE 5000' >> Dockerfile
            echo '' >> Dockerfile
            echo '# Start the application' >> Dockerfile
            echo 'CMD ["npm", "start"]' >> Dockerfile
            echo "Basic Dockerfile created."
          else
            echo "Dockerfile found."
          fi
      
      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        run: |
          # Get the proper ECR repository URI
          ECR_URI="public.ecr.aws/l4c0j8h9/${{ env.ECR_REPOSITORY }}"
          
          # Build a docker container and push it to ECR
          TIMESTAMP=$(date +%s)
          COMMIT_SHA=${GITHUB_SHA::8}
          IMAGE_TAG="${TIMESTAMP}-${COMMIT_SHA}"
          
          echo "Building Docker image: $ECR_URI:$IMAGE_TAG"
          docker build -t $ECR_URI:latest .
          docker tag $ECR_URI:latest $ECR_URI:$IMAGE_TAG
          
          echo "Pushing Docker image to ECR..."
          docker push $ECR_URI:latest
          docker push $ECR_URI:$IMAGE_TAG
          
          # Use the newer output format
          echo "image=$ECR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT
      
      - name: Check for deployment file and create if missing
        run: |
          if [ ! -f cloudmart-frontend.yaml ]; then
            echo "Deployment file not found. Creating a basic deployment file..."
            echo 'apiVersion: apps/v1' > cloudmart-frontend.yaml
            echo 'kind: Deployment' >> cloudmart-frontend.yaml
            echo 'metadata:' >> cloudmart-frontend.yaml
            echo '  name: cloudmart-frontend' >> cloudmart-frontend.yaml
            echo '  labels:' >> cloudmart-frontend.yaml
            echo '    app: cloudmart' >> cloudmart-frontend.yaml
            echo '    tier: frontend' >> cloudmart-frontend.yaml
            echo 'spec:' >> cloudmart-frontend.yaml
            echo '  replicas: 1' >> cloudmart-frontend.yaml
            echo '  selector:' >> cloudmart-frontend.yaml
            echo '    matchLabels:' >> cloudmart-frontend.yaml
            echo '      app: cloudmart' >> cloudmart-frontend.yaml
            echo '      tier: frontend' >> cloudmart-frontend.yaml
            echo '  template:' >> cloudmart-frontend.yaml
            echo '    metadata:' >> cloudmart-frontend.yaml
            echo '      labels:' >> cloudmart-frontend.yaml
            echo '        app: cloudmart' >> cloudmart-frontend.yaml
            echo '        tier: frontend' >> cloudmart-frontend.yaml
            echo '    spec:' >> cloudmart-frontend.yaml
            echo '      containers:' >> cloudmart-frontend.yaml
            echo '      - name: cloudmart-frontend' >> cloudmart-frontend.yaml
            echo '        image: CONTAINER_IMAGE' >> cloudmart-frontend.yaml
            echo '        ports:' >> cloudmart-frontend.yaml
            echo '        - containerPort: 5000' >> cloudmart-frontend.yaml
            echo '---' >> cloudmart-frontend.yaml
            echo 'apiVersion: v1' >> cloudmart-frontend.yaml
            echo 'kind: Service' >> cloudmart-frontend.yaml
            echo 'metadata:' >> cloudmart-frontend.yaml
            echo '  name: cloudmart-frontend' >> cloudmart-frontend.yaml
            echo '  labels:' >> cloudmart-frontend.yaml
            echo '    app: cloudmart' >> cloudmart-frontend.yaml
            echo '    tier: frontend' >> cloudmart-frontend.yaml
            echo 'spec:' >> cloudmart-frontend.yaml
            echo '  type: LoadBalancer' >> cloudmart-frontend.yaml
            echo '  ports:' >> cloudmart-frontend.yaml
            echo '  - port: 80' >> cloudmart-frontend.yaml
            echo '    targetPort: 5000' >> cloudmart-frontend.yaml
            echo '  selector:' >> cloudmart-frontend.yaml
            echo '    app: cloudmart' >> cloudmart-frontend.yaml
            echo '    tier: frontend' >> cloudmart-frontend.yaml
            echo "Basic deployment file created."
          else
            echo "Deployment file found."
          fi
      
      - name: Update Kubernetes deployment file
        run: |
          sed -i "s|CONTAINER_IMAGE|${{ steps.build-image.outputs.image }}|g" cloudmart-frontend.yaml
      
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
      
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f cloudmart-frontend.yaml
          kubectl get services
