name: CloudMart Kubernetes CI/CD

on:
  push:
    branches: 
      - main
      - add-roles-to-dev-imp
  pull_request:
    branches: 
      - main
      - add-roles-to-dev-imp
  workflow_dispatch:

env:
  KUBERNETES_VERSION: "1.28.0"
  KUBECTL_VERSION: "1.28.0"
  KUSTOMIZE_VERSION: "5.1.1"

jobs:
  validate:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '${{ env.KUBECTL_VERSION }}'
      
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s ${{ env.KUSTOMIZE_VERSION }} || \
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/kustomize/v${{ env.KUSTOMIZE_VERSION }}/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version
      
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.3/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          tar xf kubeconform.tar.gz
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/
          kubeconform --version
      
      - name: Validate Kubernetes manifests
        run: |
          if [ -z "$(find . -name "*.yaml" -not -path "*/\.*" -not -path "*/templates/*" | head -1)" ]; then
            echo "No YAML files found to validate."
          else
            find . -name "*.yaml" -not -path "*/\.*" -not -path "*/templates/*" | xargs -r kubeconform -kubernetes-version ${{ env.KUBERNETES_VERSION }} || true
          fi
      
      - name: Validate Kustomize builds
        run: |
          if [ -z "$(find . -name "kustomization.yaml" -not -path "*/\.*" | head -1)" ]; then
            echo "No kustomization.yaml files found to validate."
          else
            find . -name "kustomization.yaml" -not -path "*/\.*" | while read -r kustomization; do
              dir=$(dirname "$kustomization")
              echo "Validating kustomize build in $dir"
              kustomize build "$dir" | kubeconform -kubernetes-version ${{ env.KUBERNETES_VERSION }} || true
            done
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '${{ env.KUBECTL_VERSION }}'
          
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s ${{ env.KUSTOMIZE_VERSION }} || \
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/kustomize/v${{ env.KUSTOMIZE_VERSION }}/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version
          
      - name: Test Deployment
        run: |
          echo "Performing kubectl dry-run tests"
          
          # Test with Kustomize if available
          if [ -n "$(find . -name "kustomization.yaml" -not -path "*/\.*" | head -n 1)" ]; then
            echo "Testing kustomize builds with dry-run"
            find . -name "kustomization.yaml" -not -path "*/\.*" | while read -r kustomization; do
              dir=$(dirname "$kustomization")
              echo "Testing kustomize build in $dir"
              kustomize build "$dir" | kubectl apply --dry-run=client -f - || echo "Warning: Dry-run failed in $dir"
            done
          fi
          
          # Test with plain YAML as well
          if [ -n "$(find . -name "*.yaml" -not -path "*/\.*" -not -path "*/templates/*" -not -name "kustomization.yaml" | head -n 1)" ]; then
            echo "Testing plain YAML files with dry-run"
            find . -name "*.yaml" -not -path "*/\.*" -not -path "*/templates/*" -not -name "kustomization.yaml" | xargs -r kubectl apply --dry-run=client -f || echo "Warning: Dry-run failed for some YAML files"
          fi
          
          echo "All resources tested with dry-run"

  apply-to-dev:
    name: Apply to Dev Environment
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.ref == 'refs/heads/add-roles-to-dev-imp' && github.event_name == 'push'
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '${{ env.KUBECTL_VERSION }}'
          
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}
        
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s ${{ env.KUSTOMIZE_VERSION }}
          sudo mv kustomize /usr/local/bin/
          
      - name: Apply changes to Dev environment
        run: |
          # Find and apply any kustomization files for dev environment
          find . -path "*/dev/*" -name "kustomization.yaml" -not -path "*/\.*" | while read -r kustomization; do
            dir=$(dirname "$kustomization")
            echo "Applying kustomize build in $dir"
            kustomize build "$dir" | kubectl apply -f -
          done
          
          # Apply plain YAML for dev environment as fallback
          if [ ! -f "$(find . -path "*/dev/*" -name "kustomization.yaml" -not -path "*/\.*" | head -n 1)" ]; then
            find . -path "*/dev/*" -name "*.yaml" -not -path "*/\.*" -not -path "*/templates/*" | xargs kubectl apply -f
          fi
          
          echo "All resources applied to development environment"

  apply-to-prod:
    name: Apply to Production Environment
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '${{ env.KUBECTL_VERSION }}'
          
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}
        
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s ${{ env.KUSTOMIZE_VERSION }}
          sudo mv kustomize /usr/local/bin/
          
      - name: Apply changes to Production environment
        run: |
          # Find and apply any kustomization files for prod environment
          find . -path "*/prod/*" -name "kustomization.yaml" -not -path "*/\.*" | while read -r kustomization; do
            dir=$(dirname "$kustomization")
            echo "Applying kustomize build in $dir"
            kustomize build "$dir" | kubectl apply -f -
          done
          
          # Apply plain YAML for prod environment as fallback
          if [ ! -f "$(find . -path "*/prod/*" -name "kustomization.yaml" -not -path "*/\.*" | head -n 1)" ]; then
            find . -path "*/prod/*" -name "*.yaml" -not -path "*/\.*" -not -path "*/templates/*" | xargs kubectl apply -f
          fi
          
          echo "All resources applied to production environment"
