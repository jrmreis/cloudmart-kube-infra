name: CloudMart Kubernetes Roles CI/CD

on:
  push:
    branches: 
      - main
      - add-roles-to-dev-imp
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy roles to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write  # Required for OIDC authentication with AWS
  contents: read

jobs:
  deploy-roles:
    name: Deploy Kubernetes Roles
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.26.0'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}
      
      - name: Create roles manifest
        env:
          DEV_NAMESPACE: ${{ secrets.DEV_NAMESPACE || 'cloudmart-dev' }}
          PROD_NAMESPACE: ${{ secrets.PROD_NAMESPACE || 'cloudmart-prod' }}
          DEV_GROUP: ${{ secrets.DEV_GROUP || 'cloudmart-developers' }}
          OPS_GROUP: ${{ secrets.OPS_GROUP || 'cloudmart-operators' }}
        run: |
          # Create directory for kubernetes manifests
          mkdir -p k8s
          
          # Create role definitions based on the branch or manual input
          if [[ "${{ github.event.inputs.environment }}" == "dev" || ("${{ github.event.inputs.environment }}" == "" && "$GITHUB_REF" != "refs/heads/main") ]]; then
            echo "Creating development environment roles"
            # Create dev roles
            cat > k8s/dev-roles.yaml << EOF
            apiVersion: v1
            kind: Namespace
            metadata:
              name: $DEV_NAMESPACE
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: developer
              namespace: $DEV_NAMESPACE
            rules:
            - apiGroups: [""]
              resources: ["pods", "services", "configmaps", "secrets"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["apps"]
              resources: ["deployments", "statefulsets", "daemonsets"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: developer-binding
              namespace: $DEV_NAMESPACE
            subjects:
            - kind: Group
              name: $DEV_GROUP
              apiGroup: rbac.authorization.k8s.io
            roleRef:
              kind: Role
              name: developer
              apiGroup: rbac.authorization.k8s.io
            EOF
          else
            echo "Creating production environment roles"
            # Create prod roles for main branch
            cat > k8s/prod-roles.yaml << EOF
            apiVersion: v1
            kind: Namespace
            metadata:
              name: $PROD_NAMESPACE
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: Role
            metadata:
              name: operator
              namespace: $PROD_NAMESPACE
            rules:
            - apiGroups: [""]
              resources: ["pods", "services", "configmaps"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["apps"]
              resources: ["deployments", "statefulsets", "daemonsets"]
              verbs: ["get", "list", "watch"]
            ---
            apiVersion: rbac.authorization.k8s.io/v1
            kind: RoleBinding
            metadata:
              name: operator-binding
              namespace: $PROD_NAMESPACE
            subjects:
            - kind: Group
              name: $OPS_GROUP
              apiGroup: rbac.authorization.k8s.io
            roleRef:
              kind: Role
              name: operator
              apiGroup: rbac.authorization.k8s.io
            EOF
          fi
      
      - name: Apply roles
        run: |
          # List all YAML files to verify
          echo "Found the following Kubernetes manifest files:"
          find k8s -name "*.yaml" -type f
          
          # Apply the manifests with kubectl
          kubectl apply -f k8s/
          
          echo "Kubernetes roles applied successfully"
          
      - name: Verify role creation
        if: success()
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "dev" || ("${{ github.event.inputs.environment }}" == "" && "$GITHUB_REF" != "refs/heads/main") ]]; then
            kubectl get roles -n ${{ secrets.DEV_NAMESPACE || 'cloudmart-dev' }}
            kubectl get rolebindings -n ${{ secrets.DEV_NAMESPACE || 'cloudmart-dev' }}
          else
            kubectl get roles -n ${{ secrets.PROD_NAMESPACE || 'cloudmart-prod' }}
            kubectl get rolebindings -n ${{ secrets.PROD_NAMESPACE || 'cloudmart-prod' }}
          fi
          
      - name: Cleanup sensitive information
        if: always()
        run: |
          rm -f ~/.kube/config
